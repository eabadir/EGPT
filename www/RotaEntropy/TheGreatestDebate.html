<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Scoreboard: Reality vs Abstract</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        h1, h2, h3 {
            font-family: 'Merriweather', serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .nav-item {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        
        .nav-item:hover {
            background-color: rgba(51, 65, 85, 0.5);
        }

        .nav-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
        }

        .slide-content {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInSlide 0.5s ease-out forwards;
        }

        @keyframes fadeInSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 shrink-0 z-20">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400">
                    THE GREAT SCOREBOARD
                </h1>
                <p class="text-xs md:text-sm text-slate-400 italic">Reality vs Abstract: A 2,600-Year Tournament</p>
            </div>
            <div class="hidden md:block text-xs text-slate-500">
                Select an era to view details
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Nav Panel -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-slate-900 border-r border-slate-800 overflow-y-auto flex flex-col shrink-0 z-10">
            <div class="p-4 space-y-2" id="nav-container">
                <!-- Nav items injected via JS -->
            </div>
        </aside>

        <!-- Right Content Panel -->
        <main class="hidden md:flex flex-1 bg-slate-950 relative overflow-hidden items-center justify-center p-8">
            <!-- Background Decoration -->
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute top-0 right-0 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
                <div class="absolute bottom-0 left-0 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl transform -translate-x-1/2 translate-y-1/2"></div>
            </div>

            <!-- Content Container -->
            <div id="slide-container" class="w-full max-w-4xl relative z-10">
                <!-- Slide content injected via JS -->
            </div>
        </main>

        <!-- Mobile View (Overlay or Stack) - For simplicity, on mobile we just show the list and expand on click (not implemented fully for 'slide' concept on tiny screens, but nav acts as list) -->
    </div>

    <script>
        const data = [
            {
                id: 0,
                era: "600–300 BCE",
                title: "Antiquity",
                winner: "Reality",
                winnerIcon: "⭐",
                winnerClass: "text-yellow-400",
                realityPlayers: "Pythagoras, Democritus, Archimedes",
                abstractPlayers: "Plato, Euclid, Aristotle",
                comment: "Atomism and numerical harmony frame the earliest scientific worldview. Geometry begins pushing toward abstraction but has not yet conquered physics."
            },
            {
                id: 1,
                era: "300 BCE – 1500 CE",
                title: "Classical & Medieval",
                winner: "Abstract",
                winnerIcon: "🔷",
                winnerClass: "text-blue-400",
                realityPlayers: "Lucretius (continuing atomism), Oresme",
                abstractPlayers: "Euclid’s heirs, Aristotle’s infinite divisibility, Scholastics",
                comment: "Continuum metaphysics dominates intellectual life; discreteness survives only as a marginal or heretical doctrine."
            },
            {
                id: 2,
                era: "1500–1700",
                title: "The Scientific Revolution",
                winner: "Reality",
                winnerIcon: "⭐",
                winnerClass: "text-yellow-400",
                realityPlayers: "Galileo, Newton, Jakob Bernoulli",
                abstractPlayers: "Descartes (geometry), Leibniz (infinitesimals)",
                comment: "Mechanics, measurement, forces, and combinatorics bring discreteness roaring back; calculus simultaneously strengthens abstraction."
            },
            {
                id: 3,
                era: "1700–1850",
                title: "The Age of Analysis",
                winner: "Abstract",
                winnerIcon: "🔷",
                winnerClass: "text-blue-400",
                realityPlayers: "Euler, Gauss (arithmetical truth)",
                abstractPlayers: "Kant, Fourier, Dirichlet",
                comment: "Smooth analysis, differential equations, and real-number formalism push the continuum to complete dominance across mathematics."
            },
            {
                id: 4,
                era: "1850–1920",
                title: "The Age of Infinity",
                winner: "Abstract (Dominant)",
                winnerIcon: "🔷🔷",
                winnerClass: "text-blue-500",
                realityPlayers: "Boltzmann (entropy as counting), Poincaré (continuum is convention)",
                abstractPlayers: "Riemann, Dedekind, Cantor",
                comment: "Infinite sets, transfinite arithmetic, analytic continuation, and the rigorous reals give Team Abstract overwhelming conceptual power; discreteness nearly disappears philosophically."
            },
            {
                id: 5,
                era: "1900–1927",
                title: "Atoms and Quanta",
                winner: "Split",
                winnerIcon: "⚖️",
                winnerClass: "text-gray-200",
                realityPlayers: "Einstein (photoelectric effect, Brownian motion), Planck, Perrin",
                abstractPlayers: "Hilbert (infinite formal systems), early Dirac, emerging QM formalism",
                comment: "Einstein proves matter and radiation are discrete. Simultaneously, the abstract Hilbert-space formulation of quantum theory arises. A perfect philosophical stalemate before the 1927 Solvay Conference."
            },
            {
                id: 6,
                era: "1927–2025",
                title: "Quantum Weirdness",
                winner: "Abstract (Total Victory)",
                winnerIcon: "🔷🔷🔷",
                winnerClass: "text-blue-600",
                realityPlayers: "Einstein (realist lone holdout), Turing, Shannon, Ulam & von Neumann (discrete models)",
                abstractPlayers: "Bohr, Heisenberg, Dirac, Gödel, Nobel lineage of QM, Peano/Cantor/Zermelo",
                comment: "Abstract claims total victory: reality is observer-dependent, continuity is foundational, Hilbert spaces & infinities are literal. Physics becomes 'probabilistic,' yet Rota’s combinatorics goes ignored."
            },
            {
                id: 7,
                era: "2025–Now",
                title: "The EGPT Era Begins",
                winner: "Reality (Re-Emergent)",
                winnerIcon: "⭐⭐⭐⭐",
                winnerClass: "text-yellow-300",
                realityPlayers: "EGPT, information theorists, discrete physics, combinatorial foundations, Rota’s legacy",
                abstractPlayers: "Continuum-based physics, string-theory metaphysics, infinite Hilbert spaces",
                comment: "EGPT restores discreteness as the only consistent ontology: entropy is unique, addresses equal maps, primes are codes, reality must add up. The discrete paradigm returns—not as philosophy but as rigorously formal information theory."
            }
        ];

        const navContainer = document.getElementById('nav-container');
        const slideContainer = document.getElementById('slide-container');
        let activeId = 7; // Default to current era

        function renderNav() {
            navContainer.innerHTML = '';
            data.forEach(item => {
                const isActive = item.id === activeId;
                const activeClass = isActive ? 'active' : 'border-l-4 border-transparent opacity-70 hover:opacity-100';
                
                const navHtml = `
                    <div onclick="setActive(${item.id})" class="nav-item p-4 rounded-r-lg ${activeClass}">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400">${item.era}</span>
                            <span class="text-sm">${item.winnerIcon}</span>
                        </div>
                        <h4 class="font-bold text-sm text-slate-200">${item.title}</h4>
                        <div class="text-xs mt-1 ${item.winnerClass}">Winner: ${item.winner}</div>
                    </div>
                `;
                navContainer.innerHTML += navHtml;
            });
        }

        function renderSlide() {
            const item = data.find(d => d.id === activeId);
            
            // Determine border color based on winner
            let borderColor = 'border-slate-700';
            if(item.winner.includes('Reality')) borderColor = 'border-yellow-500/50';
            if(item.winner.includes('Abstract')) borderColor = 'border-blue-500/50';
            
            const html = `
                <div class="slide-content w-full bg-slate-900/80 backdrop-blur-xl border ${borderColor} rounded-2xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
                    
                    <!-- Background Watermark -->
                    <div class="absolute -right-10 -top-10 text-[10rem] opacity-[0.03] select-none pointer-events-none">
                        ${item.winnerIcon.substring(0, 2)}
                    </div>

                    <!-- Header -->
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-800 pb-6">
                        <div>
                            <div class="inline-block bg-slate-800 text-slate-300 text-xs font-bold px-3 py-1 rounded-full mb-3">
                                ${item.era}
                            </div>
                            <h2 class="text-4xl md:text-5xl font-black text-white mb-2">${item.title}</h2>
                        </div>
                        
                        <div class="mt-4 md:mt-0 text-right">
                            <div class="text-xs uppercase text-slate-500 font-bold tracking-widest mb-1">Era Winner</div>
                            <div class="flex items-center justify-end ${item.winnerClass} text-xl font-bold">
                                <span class="mr-2 text-2xl">${item.winnerIcon}</span>
                                ${item.winner}
                            </div>
                        </div>
                    </div>

                    <!-- Teams Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <!-- Team Reality -->
                        <div class="bg-slate-800/40 p-6 rounded-xl border-l-4 border-yellow-500">
                            <div class="flex items-center mb-4">
                                <span class="text-2xl mr-3">⭐</span>
                                <h3 class="text-lg font-bold text-yellow-500 uppercase tracking-wide">Team Reality</h3>
                            </div>
                            <p class="text-slate-300 leading-relaxed font-light">
                                ${item.realityPlayers}
                            </p>
                        </div>

                        <!-- Team Abstract -->
                        <div class="bg-slate-800/40 p-6 rounded-xl border-l-4 border-blue-500">
                            <div class="flex items-center mb-4">
                                <span class="text-2xl mr-3">🔷</span>
                                <h3 class="text-lg font-bold text-blue-500 uppercase tracking-wide">Team Abstract</h3>
                            </div>
                            <p class="text-slate-300 leading-relaxed font-light">
                                ${item.abstractPlayers}
                            </p>
                        </div>
                    </div>

                    <!-- Commentary -->
                    <div class="bg-slate-950/50 p-6 rounded-xl border border-slate-800">
                        <h4 class="text-xs font-bold text-slate-500 uppercase mb-2 tracking-widest">Historical Commentary</h4>
                        <p class="text-lg text-slate-300 italic font-serif leading-relaxed">
                            "${item.comment}"
                        </p>
                    </div>

                </div>
            `;
            
            // For mobile view (replacing main content if hidden) - simple alert for now or just handled by CSS display
            slideContainer.innerHTML = html;
        }

        function setActive(id) {
            activeId = id;
            renderNav();
            renderSlide();
        }

        // Initialize
        renderNav();
        renderSlide();

    </script>
</body>
</html>
